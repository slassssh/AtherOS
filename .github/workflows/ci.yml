name: AtherOS CI Pipeline

on:
  push:
    branches: ["main", "develop", "release/**"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.13"
  ATHEROS_ENV: "testing"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Run ruff
        run: ruff check backend/ --output-format=github

  # ── Job 2: Format ──────────────────────────────────────────────────────────
  format:
    name: "🎨 Format (black)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install black
      - name: Check formatting
        run: black --check backend/

  # ── Job 3: Type Check ──────────────────────────────────────────────────────
  typecheck:
    name: "🔷 Type Check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt mypy
      - name: Run mypy
        run: mypy backend/ --ignore-missing-imports --no-strict-optional

  # ── Job 4: Security Scan (bandit) ─────────────────────────────────────────
  security:
    name: "🔒 Security (bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install bandit
      - name: Run bandit
        run: bandit -r backend/ -ll --exclude backend/tests/ -f json -o bandit_report.json || true
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit_report.json

  # ── Job 5: Dependency Audit ────────────────────────────────────────────────
  audit:
    name: "📦 Dependency Audit (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --format json --output pip_audit_report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip_audit_report.json

  # ── Job 6: Tests + Coverage ────────────────────────────────────────────────
  test:
    name: "✅ Tests + Coverage"
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov
      - name: Run test suite with coverage
        env:
          ATHEROS_ENV: testing
          DEBUG: "False"
        run: |
          python -m pytest \
            backend/tests/test_stage2_pipeline.py \
            backend/tests/test_stage3_api.py \
            backend/tests/test_stage4_llm.py \
            backend/tests/test_stage5_security.py \
            backend/tests/test_stage6_database.py \
            backend/tests/test_stage7_memory.py \
            backend/tests/test_stage8_graph.py \
            backend/tests/test_stage9_agents.py \
            backend/tests/test_stage10_event_bus.py \
            backend/tests/test_stage11_plugins.py \
            backend/tests/test_stage12_desktop.py \
            backend/tests/test_stage13_model_orchestrator.py \
            backend/tests/test_stage14_cluster.py \
            backend/tests/test_stage15_rc1.py \
            --cov=backend/app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_report \
            --cov-fail-under=85 \
            -v
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage_report/

  # ── Job 7: Benchmark ──────────────────────────────────────────────────────
  benchmark:
    name: "⚡ Benchmark Suite"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run benchmarks
        env:
          ATHEROS_ENV: testing
        run: python -m backend.benchmarks
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: |
            benchmark_report.json
            benchmark_report.md

  # ── Job 8: Docker Build ───────────────────────────────────────────────────
  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t atheros:ci-${{ github.sha }} .
      - name: Smoke test Docker image
        run: |
          docker run --rm atheros:ci-${{ github.sha }} python -c "from backend.app.core.engine import Engine; Engine(); print('Docker smoke test PASSED')"
