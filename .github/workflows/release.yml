name: AtherOS Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Verify tag format ─────────────────────────────────────────────────────
  validate-tag:
    name: "🏷️ Validate Release Tag"
    runs-on: ubuntu-latest
    steps:
      - name: Check semver tag
        run: echo "Releasing tag ${{ github.ref_name }}"

  # ── Full CI gate ──────────────────────────────────────────────────────────
  ci-gate:
    name: "✅ Full CI Gate"
    uses: ./.github/workflows/ci.yml

  # ── Build & Publish Docker image ──────────────────────────────────────────
  docker-publish:
    name: "🐳 Publish Docker Image"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ────────────────────────────────────────────────────────
  github-release:
    name: "📦 Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run benchmark suite
        env:
          ATHEROS_ENV: testing
        run: python -m backend.benchmarks
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "AtherOS ${{ github.ref_name }}"
          bodyFile: docs/architecture.md
          artifacts: "benchmark_report.json,benchmark_report.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}