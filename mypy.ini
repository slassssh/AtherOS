[mypy]
python_version = 3.12
ignore_missing_imports = True
no_strict_optional = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = False
disallow_untyped_defs = False
exclude = backend/tests/|desktop/|docs/|scripts/|.venv/

[mypy-PyQt6.*]
ignore_missing_imports = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True